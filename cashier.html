<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Cashier Terminal</title>
  <meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="application-name" content="Revizo">
<meta name="apple-mobile-web-app-title" content="Revizo">
<meta name="theme-color" content="#0a0a0a">

<link rel="apple-touch-icon" href="https://i.ibb.co/KjkyPZXX/IMG-20260610-225132.jpg">
<link rel="icon" type="image/png" href="https://i.ibb.co/KjkyPZXX/IMG-20260610-225132.jpg">
  <link rel="manifest" href="manifest.json">
  
<style>
  /* UPDATED COLORS: Dark Background with Gold Boxes */
  :root { 
    --bg: #0a0a0a; 
    --card: #1a1a1a; 
    --border: #d4af37; /* Metallic Gold Border */
    --text: #ffffff; 
  }
  @media (prefers-color-scheme: light) { :root { --bg: #0a0a0a; --card: #1a1a1a; --border: #d4af37; --text: #ffffff; } }

  body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 40px 15px 15px 15px; display: flex; justify-content: center; align-items: flex-start; min-height: 90vh; }
  
  .card { background: var(--card); width: 100%; max-width: 500px; padding: 30px; border-radius: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.9); border: 1px solid var(--border); text-align: center; display: none; box-sizing: border-box; margin: 0 auto; }
  .active { display: block; }
  
  .futuristic-btn { position: relative; border: 2px solid var(--border); border-radius: 50px; color: #ffffff !important; font-weight: 900; font-size: clamp(16px, 4vw, 20px); letter-spacing: 1px; padding: 18px 20px; width: 100%; cursor: pointer; background: #1a1a1a; transition: all 0.3s ease; }
  .futuristic-btn:active { transform: scale(0.95) !important; }

  .stats-bar { display: flex; gap: 10px; margin-bottom: 20px; }
  .stat-box { flex: 1; background: rgba(212, 175, 55, 0.05); border: 1px solid var(--border); padding: 15px; border-radius: 12px; text-align: center; }
  .stat-num { font-size: 24px; font-weight: 900; color: #d4af37; }
  .list-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.4); padding: 18px 20px; border-radius: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; text-align: left;}
  .crm-card { border-left: 4px solid var(--border); }
  .btn-approve { background: #25D366; color: white; border: none; padding: 10px 14px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
  .btn-approve:active { transform: scale(0.95); }
  .btn-reject { background: rgba(255,59,48,0.2); color: #ff3b30; border: 1px solid rgba(255,59,48,0.5); padding: 10px 14px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
  .btn-reject:active { transform: scale(0.95); }
  .pin-input { width: 100%; padding: 16px; font-size: 28px; text-align: center; letter-spacing: 12px; border-radius: 14px; border: 2px solid var(--border); background: #222; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); color: var(--text); margin-bottom: 20px; outline: none; transition: 0.3s; }
  .pin-input:focus { border-color: #f1c40f; }
</style>
</head>
<body>

<div id="cashier-view" style="width: 100%; max-width: 500px;">
  
  <div id="cashier-login" class="card active">
    <img src="https://i.ibb.co/TMjycHLN/ei-1780753422474-removebg-preview.png" style="max-width: 100px; border-radius: 20px; margin-bottom: 15px; object-fit: contain;">
    <h2 style="margin-top:0; color: #d4af37;">Cashier Terminal</h2>
    <p style="opacity:0.7;">Enter 4-Digit PIN</p>
    <input type="password" id="pinInput" class="pin-input" maxlength="4" placeholder="••••" inputmode="numeric">
    <button id="unlockBtn" class="futuristic-btn" onclick="unlockDashboard()">UNLOCK TERMINAL</button>
  </div>

  <div id="cashier-dashboard" class="card" style="display:none; text-align: left;">
    <div style="text-align:center; margin-bottom:20px;">
      <img src="https://i.ibb.co/TMjycHLN/ei-1780753422474-removebg-preview.png" style="max-width: 60px; border-radius: 15px; margin-bottom: 10px; object-fit: contain;">
      <h2 style="margin:0; color: #d4af37;">🛒 Dashboard</h2>
    </div>
    
    <div class="stats-bar">
      <div class="stat-box"><div class="stat-num" id="statToday">⏳</div><div style="font-size:11px; text-transform:uppercase; opacity:0.7;">Visits Today</div></div>
      <div class="stat-box"><div class="stat-num" id="statVIPs" style="color:#d4af37;">⏳</div><div style="font-size:11px; text-transform:uppercase; opacity:0.7;">Total VIPs</div></div>
    </div>
    
    <div id="remindersSection" style="display:none; margin-bottom:25px;">
      <h3 style="color:#d4af37; font-size:14px; text-transform:uppercase;">📅 CRM Event Alerts</h3>
      <div id="reminderList"></div>
    </div>
    
    <h3 style="color:#d4af37; font-size:14px; text-transform:uppercase;">⏳ Pending Verifications</h3>
    <div id="pendingList">
      <div style='color:#888; text-align:center;'>Fetching live data...</div>
    </div>
  </div>
</div>

<script>
  const REVIZO_API = "https://script.google.com/macros/s/AKfycbzzzP7KIUr1GkW5et05N3qmxkQyfV_JDA5d1rkpNEnJLB9EQUHlRBTnERL4ojUZVdl5/exec"; 
  const urlParams = new URLSearchParams(window.location.search);
  const SHOP_ID = urlParams.get('shop') || 'RAJAGARMENTS'; 
  let authToken = localStorage.getItem('revizo3_auth_' + SHOP_ID) || '';

  window.onload = function() {
    if(authToken) launchDashboard();
  };

  function unlockDashboard() {
    const pin = document.getElementById('pinInput').value;
    if(pin.length < 4) return;
    document.getElementById('unlockBtn').innerText = 'CHECKING...';
    
    fetch(REVIZO_API + "?action=getCashierData&shopId=" + SHOP_ID + "&auth=" + pin)
      .then(r => r.json()).then(data => {
        if(data.error) {
          alert("Invalid PIN"); document.getElementById('pinInput').value = ''; document.getElementById('unlockBtn').innerText = 'UNLOCK TERMINAL';
        } else { authToken = pin; localStorage.setItem('revizo3_auth_' + SHOP_ID, pin); launchDashboard(); }
      }).catch(() => { document.getElementById('unlockBtn').innerText = 'UNLOCK TERMINAL'; alert("Network Error"); });
  }

  function launchDashboard() {
    document.getElementById('cashier-login').classList.remove('active');
    document.getElementById('cashier-dashboard').style.display = 'block';
    loadPending(); setInterval(() => { if(!document.hidden) loadPending(); }, 8000);
  }

  function loadPending() {
    fetch(REVIZO_API + "?action=getCashierData&shopId=" + SHOP_ID + "&auth=" + authToken)
      .then(r => r.json()).then(data => {
        if(!data.error) { document.getElementById('statToday').innerText = data.data.stats.today; document.getElementById('statVIPs').innerText = data.data.stats.vips; renderList(data.data.pending, data.data.reminders); }
      });
  }

  function renderList(pending, reminders) {
    const list = document.getElementById('pendingList'); list.innerHTML = '';
    if(pending && pending.length > 0) {
      pending.forEach(num => {
        const masked = '******' + String(num).slice(-4);
        list.innerHTML += `<div class='list-card' id='card-${num}'><div style='font-size:20px; font-weight:bold;'>${masked}</div><div style='display:flex; gap:8px;'><button class='btn-reject' onclick='rejectReq("${num}")'>❌</button><button class='btn-approve' onclick='approveReq("${num}")'>✓ APPROVE</button></div></div>`;
      });
    } else { list.innerHTML = "<div style='color:#888; text-align:center;'>No pending verifications...</div>"; }
    
    const remList = document.getElementById('reminderList'); remList.innerHTML = '';
    if(reminders && reminders.length > 0) {
      document.getElementById('remindersSection').style.display = 'block';
      reminders.forEach(rem => {
        
        // BULLETPROOF WHATSAPP NUMBER CLEANER
        let cleanMobile = String(rem.mobile).replace(/\D/g, '');
        if (cleanMobile.length === 10) { cleanMobile = '91' + cleanMobile; }

        const msg = encodeURIComponent(`Hi ${rem.name}! Your ${rem.type} is ${rem.time} away! Claim VIP offers at the store.`);
        
        remList.innerHTML += `<div class='list-card crm-card'><div><div style='font-weight:bold;'>${rem.name}</div><div style='font-size:12px; color:#d4af37;'><b>${rem.time}</b> to ${rem.type}</div></div><a href='https://wa.me/${cleanMobile}?text=${msg}' target='_blank' style='background:#25D366; color:#fff; padding:8px 12px; border-radius:8px; text-decoration:none; font-weight:bold; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);'>💬 MSG</a></div>`;
      });
    } else { document.getElementById('remindersSection').style.display = 'none'; }
  }

  function approveReq(mobile) {
    document.getElementById('card-'+mobile).style.opacity = '0.5';
    fetch(REVIZO_API + "?action=approveUser&shopId=" + SHOP_ID + "&mobile=" + mobile + "&auth=" + authToken).then(r => r.json()).then(d => { if(d.success) document.getElementById('card-'+mobile).remove(); loadPending(); });
  }

  function rejectReq(mobile) {
    document.getElementById('card-'+mobile).style.opacity = '0.5';
    fetch(REVIZO_API + "?action=rejectUser&shopId=" + SHOP_ID + "&mobile=" + mobile + "&auth=" + authToken).then(r => r.json()).then(d => { if(d.success) document.getElementById('card-'+mobile).remove(); loadPending(); });
  }
</script>
</body>
</html>
